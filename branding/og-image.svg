<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#181828"/>
  <!-- Heart+Fire overlay icon -->
  <text x="220" y="340" text-anchor="middle" font-size="180" dominant-baseline="middle">❤️</text>
  <text x="340" y="420" text-anchor="middle" font-size="120" dominant-baseline="middle">🔥</text>
  <!-- Wordmark -->
  <text text-anchor="start" x="480" y="340"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="120" font-weight="600" letter-spacing="-1"
    fill="#e8dfc4">Truthbook<tspan fill="#4868b0" font-weight="300">.io</tspan></text>
  <!-- Tagline -->
  <text text-anchor="start" x="480" y="440"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="38" font-weight="300" letter-spacing="0.5"
    fill="#7080a8">truthbook.io is where we settle it.</text>
</svg>