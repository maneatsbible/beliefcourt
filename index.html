<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>disputable.io - disputes in, disputes out.</title>
  <meta name="description" content="disputes in, disputes out." />
  <meta property="og:site_name" content="disputable.io" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-size='52'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header id="app-header" role="banner"></header>
  <main id="app-main" role="main"></main>
  <div id="notification-root" aria-live="polite" aria-atomic="false"></div>
  <div id="dsp-error" role="alert"></div>
  <!-- Early error catcher — runs before module graph loads -->
  <script>
    function _showError(msg) {
      var el = document.getElementById('dsp-error');
      if (!el) return;
      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }
    window.addEventListener('error', function(e) {
      _showError((e.message || 'Unknown error') + (e.filename ? '  (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      _showError(e.reason?.message || String(e.reason) || 'Unhandled rejection');
    });
  </script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
