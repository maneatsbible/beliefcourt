<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="description" content="on the record" />
  <meta property="og:site_name" content="judgmental.io" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cline x1='32' y1='8' x2='32' y2='58' stroke='%23e2dbcf' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='22' y1='58' x2='42' y2='58' stroke='%23e2dbcf' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='8' y1='20' x2='56' y2='20' stroke='%23e2dbcf' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='12' y1='20' x2='12' y2='34' stroke='%23e2dbcf' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='52' y1='20' x2='52' y2='34' stroke='%23e2dbcf' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M5 34 Q12 44 19 34' stroke='%23e2dbcf' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Cpath d='M45 34 Q52 44 59 34' stroke='%23e2dbcf' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ctext x='12' y='43' text-anchor='middle' font-size='12'%3E%F0%9F%94%A5%3C/text%3E%3Ctext x='52' y='43' text-anchor='middle' font-size='12'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header id="app-header" role="banner"></header>
  <main id="app-main" role="main"></main>
  <nav id="app-nav" role="navigation" aria-label="Main navigation"></nav>
  <div id="notification-root" aria-live="polite" aria-atomic="false"></div>
  <div id="dsp-error" role="alert"></div>
  <!-- Early error catcher — runs before module graph loads -->
  <script>
    function _showError(msg) {
      var el = document.getElementById('dsp-error');
      if (!el) return;
      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }
    window.addEventListener('error', function(e) {
      _showError((e.message || 'Unknown error') + (e.filename ? '  (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      _showError(e.reason?.message || String(e.reason) || 'Unhandled rejection');
    });
  </script>
  <script type="module" src="src/client/app.js"></script>
</body>
</html>
